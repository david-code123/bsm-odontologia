<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página não encontrada — BSM Odontologia</title>
  <link rel="icon" type="image/png" href="/images/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #080808;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
      font-family: 'Inter', sans-serif;
    }
    img { height: 64px; margin-bottom: 48px; object-fit: contain; }
    .code {
      font-family: 'Playfair Display', serif;
      font-size: clamp(80px, 20vw, 160px);
      font-weight: 700;
      background: linear-gradient(135deg, #C9A535, #A88A2A);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 24px;
    }
    h1 {
      font-size: clamp(22px, 4vw, 32px);
      font-weight: 700;
      color: #fff;
      margin-bottom: 16px;
    }
    p {
      color: rgba(255,255,255,.55);
      font-size: 16px;
      line-height: 1.7;
      max-width: 420px;
      margin-bottom: 40px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #C9A535;
      color: #080808;
      padding: 14px 32px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 15px;
      text-decoration: none;
      transition: background .2s, transform .2s;
    }
    .btn:hover { background: #A88A2A; transform: translateY(-2px); }
    footer {
      position: fixed;
      bottom: 24px;
      color: rgba(255,255,255,.2);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <img src="/images/logo.png" alt="BSM Odontologia" />
  <div class="code">404</div>
  <h1>Página não encontrada</h1>
  <p>O endereço que você acessou não existe ou foi movido. Volte para a página inicial e encontre tudo o que precisa.</p>
  <a class="btn" href="/">← Voltar ao início</a>
  <footer>© 2025 BSM Odontologia e Estética Avançada · Goiânia/GO</footer>
</body>
</html>
